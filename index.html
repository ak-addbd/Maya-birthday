<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Happy Birthday Maya</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  min-height:100vh;
  overflow:hidden;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(135deg,#ffb6d9,#ffcce5,#ffd9ec);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  padding:20px;
}

.container{
  position:relative;
  z-index:5;
  text-align:center;
  padding:30px 20px 170px;
  color:white;
  text-shadow:0 4px 14px rgba(0,0,0,0.18);
  max-width:1100px;
}

.love{
  font-size:clamp(2rem,5vw,4rem);
  margin-top:22px;
  margin-bottom:16px;
  font-weight:bold;
  animation:pulse 2s infinite;
}

.birthday{
  font-size:clamp(3.1rem,9vw,7rem);
  font-weight:900;
  line-height:1.03;
  margin-bottom:18px;
}

.subtitle{
  font-size:clamp(1.15rem,2.6vw,2rem);
  margin-bottom:24px;
  line-height:1.3;
}

.cake{
  font-size:clamp(3.3rem,7vw,5.4rem);
  line-height:1.1;
  animation:bounce 2s infinite;
  word-break:break-word;
}

.heart{
  position:absolute;
  width:24px;
  height:24px;
  background:rgba(255,255,255,0.28);
  transform:rotate(45deg);
  animation:floatUp linear infinite;
  z-index:1;
}

.heart::before,
.heart::after{
  content:"";
  position:absolute;
  width:24px;
  height:24px;
  background:rgba(255,255,255,0.28);
  border-radius:50%;
}

.heart::before{top:-12px;left:0}
.heart::after{top:0;left:-12px}

.confetti{
  position:absolute;
  width:10px;
  height:18px;
  border-radius:6px;
  opacity:0.85;
  animation:fall linear infinite;
  z-index:2;
}

.sparkle{
  position:absolute;
  color:rgba(255,255,255,0.9);
  font-size:1.2rem;
  animation:twinkle 1.8s ease-in-out infinite;
  z-index:2;
}

.sparkle.one{top:10%;left:12%}
.sparkle.two{top:18%;right:14%;animation-delay:.4s}
.sparkle.three{bottom:22%;left:18%;animation-delay:.8s}
.sparkle.four{bottom:28%;right:16%;animation-delay:1.1s}

/* penguins area */
.penguins{
  position:absolute;
  left:0;
  right:0;
  bottom:14px;
  z-index:9;
  display:flex;
  justify-content:center;
  align-items:flex-end;
  gap:clamp(10px,2.4vw,28px);
  pointer-events:none;
}

.penguinWrap{
  position:relative;
  width:110px;
  height:140px;
  animation:dance 1.2s ease-in-out infinite;
}

.penguinWrap.two{animation-delay:.2s}
.penguinWrap.three{animation-delay:.4s}

.partyHat{
  position:absolute;
  top:-2px;
  left:50%;
  transform:translateX(-50%);
  width:0;
  height:0;
  border-left:14px solid transparent;
  border-right:14px solid transparent;
  border-bottom:28px solid #ff5fa2;
  z-index:5;
}

.partyHat::before{
  content:"";
  position:absolute;
  top:26px;
  left:-16px;
  width:32px;
  height:6px;
  background:#fff;
  border-radius:999px;
}

.partyHat::after{
  content:"";
  position:absolute;
  top:-7px;
  left:-4px;
  width:8px;
  height:8px;
  background:#fff8cc;
  border-radius:50%;
  box-shadow:0 0 0 4px rgba(255,255,255,0.15);
}

.penguinBody{
  position:absolute;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:86px;
  height:112px;
  background:linear-gradient(180deg,#3d4652 0%,#1d232d 62%,#141920 100%);
  border-radius:43px 43px 38px 38px;
  box-shadow:
    inset -8px -10px 0 rgba(255,255,255,0.06),
    0 10px 18px rgba(0,0,0,0.18);
}

.penguinBelly{
  position:absolute;
  left:50%;
  top:23px;
  transform:translateX(-50%);
  width:56px;
  height:70px;
  background:linear-gradient(180deg,#ffffff 0%,#f0f3f7 100%);
  border-radius:30px;
}

.penguinHead{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  width:72px;
  height:54px;
  background:linear-gradient(180deg,#3b4350 0%,#242c37 100%);
  border-radius:50% 50% 42% 42%;
}

.eye{
  position:absolute;
  top:19px;
  width:10px;
  height:13px;
  background:#111;
  border-radius:50%;
  z-index:4;
}

.eye::after{
  content:"";
  position:absolute;
  top:2px;
  left:2px;
  width:3px;
  height:3px;
  background:#fff;
  border-radius:50%;
}

.eye.left{left:21px}
.eye.right{right:21px}

.beak{
  position:absolute;
  top:29px;
  left:50%;
  transform:translateX(-50%);
  width:18px;
  height:10px;
  background:linear-gradient(180deg,#ffcb68 0%,#ff9f2f 100%);
  border-radius:50% 50% 60% 60%;
  clip-path:polygon(0 0,100% 0,50% 100%);
  z-index:4;
}

.blush{
  position:absolute;
  top:33px;
  width:12px;
  height:7px;
  background:rgba(255,170,190,0.45);
  border-radius:50%;
  filter:blur(1px);
  z-index:3;
}

.blush.left{left:14px}
.blush.right{right:14px}

.smile{
  position:absolute;
  top:38px;
  left:50%;
  transform:translateX(-50%);
  width:16px;
  height:8px;
  border-bottom:2px solid rgba(70,70,70,0.55);
  border-radius:0 0 16px 16px;
  z-index:4;
}

.wing{
  position:absolute;
  top:46px;
  width:22px;
  height:48px;
  background:linear-gradient(180deg,#202631 0%,#11161d 100%);
  border-radius:20px;
}

.wing.left{
  left:-7px;
  transform:rotate(22deg);
  animation:wingLeft 1s ease-in-out infinite;
  transform-origin:top center;
}

.wing.right{
  right:-7px;
  transform:rotate(-22deg);
  animation:wingRight 1s ease-in-out infinite;
  transform-origin:top center;
}

.foot{
  position:absolute;
  bottom:-6px;
  width:22px;
  height:10px;
  background:#ffb24d;
  border-radius:999px;
}

.foot.left{left:21px}
.foot.right{right:21px}

/* walking penguin + cake */
.walkingStage{
  position:absolute;
  left:-260px;
  bottom:26px;
  z-index:10;
  display:flex;
  align-items:flex-end;
  gap:10px;
  animation:walkAcross 13s linear infinite;
  pointer-events:none;
}

.walkingPenguinWrap{
  position:relative;
  width:120px;
  height:150px;
  animation:waddle .55s ease-in-out infinite;
}

.walkingHat{
  position:absolute;
  top:-2px;
  left:50%;
  transform:translateX(-50%);
  width:0;
  height:0;
  border-left:16px solid transparent;
  border-right:16px solid transparent;
  border-bottom:32px solid #ff72ad;
  z-index:5;
}

.walkingHat::before{
  content:"";
  position:absolute;
  top:29px;
  left:-18px;
  width:36px;
  height:6px;
  background:#fff;
  border-radius:999px;
}

.walkingHat::after{
  content:"";
  position:absolute;
  top:-8px;
  left:-5px;
  width:10px;
  height:10px;
  background:#fff6c9;
  border-radius:50%;
}

.walkingPenguin .penguinBody{
  width:94px;
  height:122px;
}

.walkingPenguin .penguinHead{
  width:78px;
  height:58px;
}

.walkingPenguin .penguinBelly{
  width:60px;
  height:78px;
}

.giantCake{
  position:relative;
  width:100px;
  height:86px;
  animation:cakeBob 1s ease-in-out infinite;
  filter:drop-shadow(0 8px 14px rgba(0,0,0,0.15));
}

.cakeBase{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  width:88px;
  height:42px;
  background:linear-gradient(180deg,#fff6fb 0%,#f6d9e8 100%);
  border-radius:14px;
  box-shadow:inset 0 -8px 0 rgba(255,120,170,0.18);
}

.cakeTop{
  position:absolute;
  bottom:43px;
  left:50%;
  transform:translateX(-50%);
  width:76px;
  height:18px;
  background:#fff;
  border-radius:12px 12px 8px 8px;
}

.cakeTrim{
  position:absolute;
  bottom:27px;
  left:50%;
  transform:translateX(-50%);
  width:78px;
  height:8px;
  background:repeating-linear-gradient(
    90deg,
    #ff73a9 0 10px,
    #fff 10px 20px
  );
  border-radius:999px;
}

.candle{
  position:absolute;
  bottom:60px;
  width:8px;
  height:18px;
  background:#9ad8ff;
  border-radius:4px;
}

.candle::after{
  content:"";
  position:absolute;
  top:-9px;
  left:50%;
  transform:translateX(-50%);
  width:9px;
  height:9px;
  background:#ffe77a;
  border-radius:50% 50% 50% 50%;
  clip-path:polygon(50% 0%, 70% 35%, 100% 60%, 70% 100%, 30% 100%, 0% 60%, 30% 35%);
}

.candle.one{left:26px}
.candle.two{left:46px}
.candle.three{left:66px}

@keyframes walkAcross{
  0%{transform:translateX(0)}
  100%{transform:translateX(calc(100vw + 420px))}
}

@keyframes waddle{
  0%,100%{transform:rotate(-6deg) translateY(0)}
  50%{transform:rotate(6deg) translateY(-6px)}
}

@keyframes dance{
  0%,100%{transform:translateY(0) rotate(-5deg)}
  50%{transform:translateY(-12px) rotate(5deg)}
}

@keyframes wingLeft{
  0%,100%{transform:rotate(22deg)}
  50%{transform:rotate(40deg)}
}

@keyframes wingRight{
  0%,100%{transform:rotate(-22deg)}
  50%{transform:rotate(-40deg)}
}

@keyframes floatUp{
  0%{transform:translateY(110vh) rotate(45deg) scale(.8);opacity:0}
  10%{opacity:1}
  100%{transform:translateY(-20vh) rotate(45deg) scale(1.2);opacity:0}
}

@keyframes fall{
  0%{transform:translateY(-20vh) rotate(0deg);opacity:1}
  100%{transform:translateY(110vh) rotate(360deg);opacity:.5}
}

@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.05)}
}

@keyframes cakeBob{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}

@keyframes twinkle{
  0%,100%{opacity:.3;transform:scale(.9)}
  50%{opacity:1;transform:scale(1.2)}
}

@media (max-width:700px){
  .container{padding:20px 10px 210px}
  .penguins{gap:4px;bottom:4px}
  .penguinWrap{transform:scale(.84)}
  .walkingStage{bottom:90px}
  .subtitle{padding:0 8px}
  .cake{font-size:clamp(2.8rem,8vw,4rem)}
}

@media (max-height:700px){
  .container{padding-bottom:150px}
  .penguins{bottom:2px}
}

</style>
</head>
<body>

<div class="sparkle one">✦</div>
<div class="sparkle two">✦</div>
<div class="sparkle three">✦</div>
<div class="sparkle four">✦</div>

<div class="container">
  <div class="birthday">HAPPY BIRTHDAY MAYA 🎂❤️❤️❤️</div>
  <div class="subtitle">Hope you have the most blessed birthday ever and life ahead my love ❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️</div>
  <div class="love">I LOVE YOU ❤️</div>
  <div class="cake">🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂</div>
</div>

<div class="penguins">
  <div class="penguinWrap one">
    <div class="partyHat"></div>
    <div class="penguinBody">
      <div class="penguinHead">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="blush left"></div>
        <div class="blush right"></div>
        <div class="beak"></div>
        <div class="smile"></div>
      </div>
      <div class="penguinBelly"></div>
      <div class="wing left"></div>
      <div class="wing right"></div>
      <div class="foot left"></div>
      <div class="foot right"></div>
    </div>
  </div>

  <div class="penguinWrap two">
    <div class="partyHat"></div>
    <div class="penguinBody">
      <div class="penguinHead">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="blush left"></div>
        <div class="blush right"></div>
        <div class="beak"></div>
        <div class="smile"></div>
      </div>
      <div class="penguinBelly"></div>
      <div class="wing left"></div>
      <div class="wing right"></div>
      <div class="foot left"></div>
      <div class="foot right"></div>
    </div>
  </div>

  <div class="penguinWrap three">
    <div class="partyHat"></div>
    <div class="penguinBody">
      <div class="penguinHead">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="blush left"></div>
        <div class="blush right"></div>
        <div class="beak"></div>
        <div class="smile"></div>
      </div>
      <div class="penguinBelly"></div>
      <div class="wing left"></div>
      <div class="wing right"></div>
      <div class="foot left"></div>
      <div class="foot right"></div>
    </div>
  </div>
</div>

<div class="walkingStage">
  <div class="walkingPenguinWrap walkingPenguin">
    <div class="walkingHat"></div>
    <div class="penguinBody">
      <div class="penguinHead">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="blush left"></div>
        <div class="blush right"></div>
        <div class="beak"></div>

      </div>
      <div class="penguinBelly"></div>
      <div class="wing left"></div>
      <div class="wing right"></div>
      <div class="foot left"></div>
      <div class="foot right"></div>
    </div>
  </div>

  <div class="giantCake">
    <div class="cakeTop"></div>
    <div class="cakeBase"></div>
    <div class="cakeTrim"></div>
    <div class="candle one"></div>
    <div class="candle two"></div>
    <div class="candle three"></div>
  </div>
</div>

<script>
const heartCount = 50;
const confettiCount = 80;
const confettiColors = ['#ffffff','#ff69b4','#ffd1dc','#ffe066','#ffc0cb'];

for(let i=0;i<heartCount;i++){
  const heart=document.createElement('div');
  heart.className='heart';
  heart.style.left=Math.random()*100+'vw';
  heart.style.animationDuration=4+Math.random()*5+'s';
  heart.style.animationDelay=Math.random()*5+'s';
  heart.style.opacity=0.2+Math.random()*0.35;
  document.body.appendChild(heart);
}

for(let i=0;i<confettiCount;i++){
  const piece=document.createElement('div');
  piece.className='confetti';
  piece.style.left=Math.random()*100+'vw';
  piece.style.top=-Math.random()*100+'vh';
  piece.style.background=confettiColors[Math.floor(Math.random()*confettiColors.length)];
  piece.style.animationDuration=4+Math.random()*4+'s';
  piece.style.animationDelay=Math.random()*4+'s';
  document.body.appendChild(piece);
}
</script>
