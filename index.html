<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Maya</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffb6d9, #ffcce5, #ffd9ec);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 30px;
      color: white;
      text-shadow: 0 4px 14px rgba(0, 0, 0, 0.18);
    }

    .love {
      font-size: clamp(2rem, 5vw, 4rem);
      margin-bottom: 16px;
      font-weight: bold;
    }

    .birthday {
      font-size: clamp(3rem, 9vw, 7rem);
      font-weight: 900;
      line-height: 1.05;
      margin-bottom: 18px;
    }

    .subtitle {
      font-size: clamp(1.2rem, 3vw, 2rem);
      margin-bottom: 24px;
    }

    .cake {
      font-size: clamp(5rem, 12vw, 9rem);
      animation: bounce 2s infinite;
    }

    .heart {
      position: absolute;
      width: 28px;
      height: 28px;
      background: rgba(255, 255, 255, 0.9);
      transform: rotate(45deg);
      animation: floatUp linear infinite;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 28px;
      height: 28px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 50%;
    }

    .heart::before {
      top: -14px;
      left: 0;
    }

    .heart::after {
      top: 0;
      left: -14px;
    }

    .confetti {
      position: absolute;
      width: 10px;
      height: 18px;
      border-radius: 4px;
      opacity: 0.85;
      animation: fall linear infinite;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(110vh) rotate(45deg) scale(0.7);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(-20vh) rotate(45deg) scale(1.15);
        opacity: 0;
      }
    }

    @keyframes fall {
      0% {
        transform: translateY(-20vh) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0.7;
      }
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="love">I love you ❤️</div>
    <div class="birthday">HAPPY BIRTHDAY MAYA</div>
    <div class="subtitle">Hope you have the most blessed birthday my love and life ahead ❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️</div>
    <div class="cake">🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂</div>
  </div>

  <script>
    const heartCount = 50;
    const confettiCount = 80;
    const confettiColors = ['#ffffff', '#ff69b4', '#ffd1dc', '#ffe066', '#ffc0cb'];

    for (let i = 0; i < heartCount; i++) {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = 4 + Math.random() * 5 + 's';
      heart.style.animationDelay = Math.random() * 5 + 's';
      heart.style.opacity = 0.5 + Math.random() * 0.5;
      document.body.appendChild(heart);
    }

    for (let i = 0; i < confettiCount; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti';
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.top = -Math.random() * 100 + 'vh';
      piece.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
      piece.style.animationDuration = 4 + Math.random() * 4 + 's';
      piece.style.animationDelay = Math.random() * 4 + 's';
      document.body.appendChild(piece);
    }
  </script>
</body>
</html>
