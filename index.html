<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Maya</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #ffb6d9, #ffcce5, #ffd9ec);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 20px;
    }

    .container {
      position: relative;
      z-index: 8;
      text-align: center;
      padding: 30px 20px 230px;
      color: white;
      text-shadow: 0 4px 14px rgba(0,0,0,0.18);
      max-width: 1100px;
    }

    .love {
      font-size: clamp(2rem, 5vw, 4rem);
      margin-top: 22px;
      margin-bottom: 16px;
      font-weight: bold;
      animation: pulse 2s infinite;
    }

    .birthday {
      font-size: clamp(3.1rem, 9vw, 7rem);
      font-weight: 900;
      line-height: 1.03;
      margin-bottom: 18px;
    }

    .subtitle {
      font-size: clamp(1.15rem, 2.6vw, 2rem);
      margin-bottom: 24px;
      line-height: 1.3;
    }

    .cake {
      font-size: clamp(3.3rem, 7vw, 5.4rem);
      line-height: 1.1;
      animation: bounce 2s infinite;
      word-break: break-word;
    }

    .heart {
      position: absolute;
      width: 24px;
      height: 24px;
      background: rgba(255,255,255,0.18);
      transform: rotate(45deg);
      animation: floatUp linear infinite;
      z-index: 1;
      pointer-events: none;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 24px;
      height: 24px;
      background: rgba(255,255,255,0.18);
      border-radius: 50%;
    }

    .heart::before { top: -12px; left: 0; }
    .heart::after { top: 0; left: -12px; }

    .confetti {
      position: absolute;
      width: 10px;
      height: 18px;
      border-radius: 6px;
      opacity: 0.85;
      animation: fall linear infinite;
      z-index: 2;
      pointer-events: none;
    }

    .sparkle {
      position: absolute;
      color: rgba(255,255,255,0.9);
      font-size: 1.2rem;
      animation: twinkle 1.8s ease-in-out infinite;
      z-index: 2;
      pointer-events: none;
    }

    .sparkle.one { top: 10%; left: 12%; }
    .sparkle.two { top: 18%; right: 14%; animation-delay: .4s; }
    .sparkle.three { bottom: 22%; left: 18%; animation-delay: .8s; }
    .sparkle.four { bottom: 28%; right: 16%; animation-delay: 1.1s; }

    .rose {
      position: absolute;
      top: -80px;
      font-size: clamp(1.4rem, 2vw, 2rem);
      z-index: 3;
      pointer-events: none;
      animation: roseFall linear infinite;
      filter: drop-shadow(0 6px 8px rgba(0,0,0,0.15));
    }

    .penguins {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 6px;
      z-index: 9;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: clamp(34px, 8vw, 120px);
      pointer-events: none;
    }

    .penguinWrap {
      position: relative;
      width: 120px;
      height: 170px;
      transform-origin: center bottom;
    }

    .penguinWrap.dancing {
      animation: dance 1.2s ease-in-out infinite;
    }

    .penguinWrap.one { animation-delay: 0s; }
    .penguinWrap.two { animation-delay: .2s; }
    .penguinWrap.three { animation-delay: .4s; }

    .penguinWrap.exitLeft {
      animation: exitLeft 1.7s ease-in forwards;
    }

    .penguinWrap.exitDown {
      animation: exitDown 1.7s ease-in forwards;
    }

    .penguinWrap.exitRight {
      animation: exitRight 1.7s ease-in forwards;
    }

    .penguinWrap.returnLeft {
      animation: returnLeft 1.9s ease-out forwards;
    }

    .penguinWrap.returnDown {
      animation: returnDown 1.9s ease-out forwards;
    }

    .penguinWrap.returnRight {
      animation: returnRight 1.9s ease-out forwards;
    }

    .penguinWrap.leaveGiftLeft {
      animation: leaveGiftLeft 3s ease-in-out forwards;
    }

    .penguinWrap.leaveGiftDown {
      animation: leaveGiftDown 3s ease-in-out forwards;
    }

    .penguinWrap.leaveGiftRight {
      animation: leaveGiftRight 3s ease-in-out forwards;
    }

    .partyHat,
    .walkingHat {
      position: absolute;
      top: 2px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 16px solid transparent;
      border-right: 16px solid transparent;
      border-bottom: 34px solid #ff5fa2;
      z-index: 8;
    }

    .partyHat::before,
    .walkingHat::before {
      content: "";
      position: absolute;
      top: 31px;
      left: -18px;
      width: 36px;
      height: 7px;
      background: #fff;
      border-radius: 999px;
    }

    .partyHat::after,
    .walkingHat::after {
      content: "";
      position: absolute;
      top: -8px;
      left: -5px;
      width: 10px;
      height: 10px;
      background: #fff7bf;
      border-radius: 50%;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.15);
    }

    .penguinBody {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 92px;
      height: 122px;
      background: radial-gradient(circle at 35% 25%, #4a5361 0%, #27303c 45%, #151a21 100%);
      border-radius: 48px 48px 40px 40px;
      box-shadow:
        inset -8px -10px 0 rgba(255,255,255,0.05),
        0 12px 20px rgba(0,0,0,0.18);
    }

    .penguinBelly {
      position: absolute;
      left: 50%;
      top: 26px;
      transform: translateX(-50%);
      width: 60px;
      height: 78px;
      background: linear-gradient(180deg, #ffffff 0%, #edf1f6 100%);
      border-radius: 32px;
      z-index: 2;
    }

    .penguinHead {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 76px;
      height: 58px;
      background: linear-gradient(180deg, #404a58 0%, #222a35 100%);
      border-radius: 50% 50% 44% 44%;
      z-index: 4;
    }

    .facePatch {
      position: absolute;
      top: 12px;
      width: 22px;
      height: 22px;
      background: #f7f8fb;
      border-radius: 50%;
      z-index: 5;
      opacity: 0.95;
    }

    .facePatch.left { left: 9px; }
    .facePatch.right { right: 9px; }

    .eye {
      position: absolute;
      top: 20px;
      width: 10px;
      height: 13px;
      background: #111;
      border-radius: 50%;
      z-index: 6;
    }

    .eye::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 3px;
      height: 3px;
      background: white;
      border-radius: 50%;
    }

    .eye.left { left: 23px; }
    .eye.right { right: 23px; }

    .cheek {
      position: absolute;
      top: 33px;
      width: 12px;
      height: 8px;
      background: rgba(255, 176, 196, 0.55);
      border-radius: 50%;
      filter: blur(1px);
      z-index: 5;
    }

    .cheek.left { left: 13px; }
    .cheek.right { right: 13px; }

    .beak {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 18px;
      height: 12px;
      background: linear-gradient(180deg, #ffd16f 0%, #ff9f2f 100%);
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      z-index: 7;
      border-radius: 2px;
    }

    .smile {
      position: absolute;
      top: 42px;
      left: 50%;
      transform: translateX(-50%);
      width: 18px;
      height: 8px;
      border-bottom: 2px solid rgba(60,60,60,0.6);
      border-radius: 0 0 18px 18px;
      z-index: 7;
    }

    .wing {
      position: absolute;
      top: 50px;
      width: 24px;
      height: 52px;
      background: linear-gradient(180deg, #1f2630 0%, #0e1319 100%);
      border-radius: 20px;
      z-index: 1;
    }

    .wing.left {
      left: -8px;
      transform: rotate(24deg);
      animation: wingLeft 1s ease-in-out infinite;
      transform-origin: top center;
    }

    .wing.right {
      right: -8px;
      transform: rotate(-24deg);
      animation: wingRight 1s ease-in-out infinite;
      transform-origin: top center;
    }

    .foot {
      position: absolute;
      bottom: -6px;
      width: 22px;
      height: 10px;
      background: #ffb24d;
      border-radius: 999px;
      z-index: 0;
    }

    .foot.left { left: 22px; }
    .foot.right { right: 22px; }

    .gift {
      position: absolute;
      bottom: 18px;
      right: -16px;
      width: 38px;
      height: 38px;
      opacity: 0;
      transform: translateY(12px) scale(.8);
      transition: opacity .5s ease, transform .5s ease;
      z-index: 9;
    }

    .giftBox {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #ff7fb5, #ff4f9a);
      border-radius: 8px;
      box-shadow: 0 6px 10px rgba(0,0,0,0.12);
    }

    .giftRibbonV,
    .giftRibbonH {
      position: absolute;
      background: #fff7bf;
      z-index: 2;
      border-radius: 999px;
    }

    .giftRibbonV {
      width: 8px;
      height: 38px;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
    }

    .giftRibbonH {
      width: 38px;
      height: 8px;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
    }

    .giftBow {
      position: absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 12px;
      z-index: 3;
    }

    .giftBow::before,
    .giftBow::after {
      content: "";
      position: absolute;
      width: 12px;
      height: 12px;
      background: #fff7bf;
      border-radius: 12px 12px 0 12px;
    }

    .giftBow::before {
      left: 0;
      transform: rotate(-25deg);
    }

    .giftBow::after {
      right: 0;
      transform: scaleX(-1) rotate(-25deg);
    }

    .penguinWrap.hasGift .gift {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .walkingStage {
      position: absolute;
      left: -320px;
      bottom: 24px;
      z-index: 10;
      display: flex;
      align-items: flex-end;
      gap: 14px;
      pointer-events: none;
      animation: cakeArrive 7s ease-in-out forwards;
    }

    .walkingStage.stopped {
      left: calc(50% + 220px);
      transform: translateX(-50%);
    }

    .walkingPenguinWrap {
      position: relative;
      width: 130px;
      height: 170px;
      animation: waddle .55s ease-in-out infinite;
    }

    .walkingPenguinWrap .penguinBody {
      width: 100px;
      height: 130px;
    }

    .walkingPenguinWrap .penguinHead {
      width: 82px;
      height: 62px;
    }

    .walkingPenguinWrap .penguinBelly {
      width: 64px;
      height: 82px;
    }

    .giantCake {
      position: relative;
      width: 110px;
      height: 92px;
      animation: cakeBob 1s ease-in-out infinite;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,0.15));
    }

    .cakeBase {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 94px;
      height: 46px;
      background: linear-gradient(180deg, #fff6fb 0%, #f6d9e8 100%);
      border-radius: 14px;
      box-shadow: inset 0 -8px 0 rgba(255,120,170,0.18);
    }

    .cakeTop {
      position: absolute;
      bottom: 45px;
      left: 50%;
      transform: translateX(-50%);
      width: 82px;
      height: 18px;
      background: #fff;
      border-radius: 12px 12px 8px 8px;
    }

    .cakeTrim {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      width: 82px;
      height: 8px;
      background: repeating-linear-gradient(90deg, #ff73a9 0 10px, #fff 10px 20px);
      border-radius: 999px;
    }

    .candle {
      position: absolute;
      bottom: 62px;
      width: 8px;
      height: 18px;
      background: #9ad8ff;
      border-radius: 4px;
    }

    .candle::after {
      content: "";
      position: absolute;
      top: -9px;
      left: 50%;
      transform: translateX(-50%);
      width: 9px;
      height: 9px;
      background: #ffe77a;
      border-radius: 50%;
      clip-path: polygon(50% 0%, 70% 35%, 100% 60%, 70% 100%, 30% 100%, 0% 60%, 30% 35%);
    }

    .candle.one { left: 28px; }
    .candle.two { left: 50px; }
    .candle.three { left: 72px; }

    @keyframes cakeArrive {
      0% { left: -320px; }
      60% { left: calc(50% + 220px); transform: translateX(-50%); }
      100% { left: calc(50% + 220px); transform: translateX(-50%); }
    }

    @keyframes exitLeft {
      0% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateX(-260px) translateY(90px) rotate(-18deg); opacity: 0; }
    }

    @keyframes exitDown {
      0% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateX(0) translateY(150px) rotate(0deg); opacity: 0; }
    }

    @keyframes exitRight {
      0% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateX(260px) translateY(90px) rotate(18deg); opacity: 0; }
    }

    @keyframes returnLeft {
      0% { transform: translateX(-300px) translateY(100px) rotate(-18deg); opacity: 0; }
      100% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 1; }
    }

    @keyframes returnDown {
      0% { transform: translateX(0) translateY(160px) rotate(0deg); opacity: 0; }
      100% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 1; }
    }

    @keyframes returnRight {
      0% { transform: translateX(300px) translateY(100px) rotate(18deg); opacity: 0; }
      100% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 1; }
    }

    @keyframes leaveGiftLeft {
      0% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 1; }
      15% { transform: translateX(-20px) translateY(-4px) rotate(-5deg); }
      30% { transform: translateX(-60px) translateY(0) rotate(5deg); }
      45% { transform: translateX(-110px) translateY(-4px) rotate(-5deg); }
      60% { transform: translateX(-170px) translateY(0) rotate(5deg); }
      75% { transform: translateX(-240px) translateY(-4px) rotate(-5deg); }
      100% { transform: translateX(-360px) translateY(20px) rotate(-8deg); opacity: 0; }
    }

    @keyframes leaveGiftDown {
      0% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 1; }
      15% { transform: translateX(10px) translateY(18px) rotate(4deg); }
      30% { transform: translateX(-10px) translateY(48px) rotate(-4deg); }
      45% { transform: translateX(10px) translateY(82px) rotate(4deg); }
      60% { transform: translateX(-10px) translateY(120px) rotate(-4deg); }
      75% { transform: translateX(8px) translateY(170px) rotate(4deg); }
      100% { transform: translateX(0) translateY(270px) rotate(0deg); opacity: 0; }
    }

    @keyframes leaveGiftRight {
      0% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 1; }
      15% { transform: translateX(20px) translateY(-4px) rotate(5deg); }
      30% { transform: translateX(60px) translateY(0) rotate(-5deg); }
      45% { transform: translateX(110px) translateY(-4px) rotate(5deg); }
      60% { transform: translateX(170px) translateY(0) rotate(-5deg); }
      75% { transform: translateX(240px) translateY(-4px) rotate(5deg); }
      100% { transform: translateX(360px) translateY(20px) rotate(8deg); opacity: 0; }
    }

    @keyframes waddle {
      0%,100% { transform: rotate(-6deg) translateY(0); }
      50% { transform: rotate(6deg) translateY(-6px); }
    }

    @keyframes dance {
      0%,100% { transform: translateY(0) rotate(-5deg); }
      50% { transform: translateY(-12px) rotate(5deg); }
    }

    @keyframes wingLeft {
      0%,100% { transform: rotate(24deg); }
      50% { transform: rotate(42deg); }
    }

    @keyframes wingRight {
      0%,100% { transform: rotate(-24deg); }
      50% { transform: rotate(-42deg); }
    }

    @keyframes floatUp {
      0% { transform: translateY(110vh) rotate(45deg) scale(.8); opacity: 0; }
      10% { opacity: 1; }
      100% { transform: translateY(-20vh) rotate(45deg) scale(1.2); opacity: 0; }
    }

    @keyframes fall {
      0% { transform: translateY(-20vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: .5; }
    }

    @keyframes roseFall {
      0% { transform: translateY(-100px) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      100% { transform: translateY(115vh) rotate(360deg); opacity: .9; }
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes cakeBob {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes twinkle {
      0%,100% { opacity: .3; transform: scale(.9); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    @media (max-width: 700px) {
      .container { padding: 20px 10px 260px; }
      .penguins { gap: 30px; bottom: 2px; }
      .penguinWrap { transform: scale(.75); }
      .walkingStage { bottom: 88px; }
      .subtitle { padding: 0 8px; }
      .cake { font-size: clamp(2.8rem, 8vw, 4rem); }
    }

    @media (max-height: 700px) {
      .container { padding-bottom: 180px; }
      .penguins { bottom: 0; }
    }
  </style>
</head>

    <div class="penguinWrap three dancing" id="penguin3">
      <div class="partyHat"></div>
      <div class="penguinBody">
        <div class="penguinHead">
          <div class="facePatch left"></div>

          <div class="eye left"></div>

        </div>

        <div class="foot left"></div>

      </div>
      <div class="gift">

        <div class="giftRibbonV"></div>
        <div class="giftRibbonH"></div>
        <div class="giftBow"></div>
      </div>
    </div>
  </div>

  <div class="walkingStage" id="walkingStage">
    <div class="walkingPenguinWrap">
      <div class="walkingHat"></div>
      <div class="penguinBody">
        <div class="penguinHead">
          <div class="facePatch left"></div>
          <div class="facePatch right"></div>
          <div class="eye left"></div>
          <div class="eye right"></div>
          <div class="cheek left"></div>
          <div class="cheek right"></div>
          <div class="beak"></div>
          <div class="smile"></div>
        </div>
        <div class="penguinBelly"></div>
        <div class="wing left"></div>
        <div class="wing right"></div>
        <div class="foot left"></div>
        <div class="foot right"></div>
      </div>
    </div>

    <div class="giantCake">
      <div class="cakeTop"></div>
      <div class="cakeBase"></div>
      <div class="cakeTrim"></div>
      <div class="candle one"></div>
      <div class="candle two"></div>
      <div class="candle three"></div>
    </div>
  </div>

  <script>
    const heartCount = 50;
    const confettiCount = 80;
    const roseCount = 22;
    const confettiColors = ['#ffffff','#ff69b4','#ffd1dc','#ffe066','#ffc0cb'];

    const penguin1 = document.getElementById('penguin1');
    const penguin2 = document.getElementById('penguin2');
    const penguin3 = document.getElementById('penguin3');
    const walkingStage = document.getElementById('walkingStage');

    for (let i = 0; i < heartCount; i++) {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = 4 + Math.random() * 5 + 's';
      heart.style.animationDelay = Math.random() * 5 + 's';
      heart.style.opacity = 0.2 + Math.random() * 0.35;
      document.body.appendChild(heart);
    }

    for (let i = 0; i < confettiCount; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti';
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.top = -Math.random() * 100 + 'vh';
      piece.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
      piece.style.animationDuration = 4 + Math.random() * 4 + 's';
      piece.style.animationDelay = Math.random() * 4 + 's';
      document.body.appendChild(piece);
    }

    for (let i = 0; i < roseCount; i++) {
      const rose = document.createElement('div');
      rose.className = 'rose';
      rose.textContent = Math.random() > 0.5 ? '🌹' : '🌷';
      rose.style.left = Math.random() * 100 + 'vw';
      rose.style.animationDuration = 7 + Math.random() * 6 + 's';
      rose.style.animationDelay = Math.random() * 8 + 's';
      rose.style.fontSize = (1.2 + Math.random() * 1.2) + 'rem';
      document.body.appendChild(rose);
    }

    setTimeout(() => {
      walkingStage.classList.add('stopped');
    }, 7000);

    setTimeout(() => {
      penguin1.className = 'penguinWrap one exitLeft';
      penguin2.className = 'penguinWrap two exitDown';
      penguin3.className = 'penguinWrap three exitRight';
    }, 7600);

    setTimeout(() => {
      penguin1.className = 'penguinWrap one returnLeft dancing hasGift';
      penguin2.className = 'penguinWrap two returnDown dancing hasGift';
      penguin3.className = 'penguinWrap three returnRight dancing hasGift';
    }, 9800);

    setTimeout(() => {
      penguin1.className = 'penguinWrap one leaveGiftLeft hasGift';
      penguin2.className = 'penguinWrap two leaveGiftDown hasGift';
      penguin3.className = 'penguinWrap three leaveGiftRight hasGift';
    }, 13400);
  </script>

</body>
</html>
