<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Happy Birthday Maya</title>

<style>

*{box-sizing:border-box;margin:0;padding:0}

body{
min-height:100vh;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#ffb6d9,#ffcce5,#ffd9ec);
display:flex;
align-items:center;
justify-content:center;
position:relative;
padding:20px;
}

.container{
position:relative;
z-index:2;
text-align:center;
padding:30px;
color:white;
text-shadow:0 4px 14px rgba(0,0,0,0.18);
max-width:900px;
}

.love{
font-size:clamp(2rem,5vw,4rem);
margin-bottom:16px;
font-weight:bold;
animation:pulse 2s infinite;
}

.birthday{
font-size:clamp(3rem,9vw,7rem);
font-weight:900;
line-height:1.05;
margin-bottom:18px;
}

.subtitle{
font-size:clamp(1.2rem,3vw,2rem);
margin-bottom:24px;
}

.cake{
font-size:clamp(4rem,10vw,7rem);
animation:bounce 2s infinite;
}

/* hearts */

.heart{
position:absolute;
width:24px;
height:24px;
background:rgba(255,255,255,0.9);
transform:rotate(45deg);
animation:floatUp linear infinite;
}

.heart::before,
.heart::after{
content:"";
position:absolute;
width:24px;
height:24px;
background:rgba(255,255,255,0.9);
border-radius:50%;
}

.heart::before{top:-12px;left:0}
.heart::after{top:0;left:-12px}

/* confetti */

.confetti{
position:absolute;
width:10px;
height:18px;
border-radius:4px;
opacity:0.85;
animation:fall linear infinite;
}

/* penguins */

.penguins{
position:absolute;
bottom:20px;
left:0;
width:100%;
display:flex;
justify-content:center;
gap:30px;
}

.penguin{
font-size:80px;
animation:dance 1.5s infinite;
}

/* walking penguin with cake */

.walkingPenguin{
position:absolute;
bottom:40px;
left:-200px;
font-size:90px;
animation:walkAcross 12s linear infinite;
}

.giantCake{
position:absolute;
bottom:10px;
left:-200px;
font-size:120px;
animation:walkAcross 12s linear infinite;
animation-delay:0.2s;
}

/* animations */

@keyframes walkAcross{
0%{left:-200px}
100%{left:110%}
}

@keyframes dance{
0%,100%{transform:rotate(-6deg)}
50%{transform:rotate(6deg)}
}

@keyframes floatUp{
0%{transform:translateY(110vh) rotate(45deg);opacity:0}
10%{opacity:1}
100%{transform:translateY(-20vh) rotate(45deg);opacity:0}
}

@keyframes fall{
0%{transform:translateY(-20vh) rotate(0deg)}
100%{transform:translateY(110vh) rotate(360deg)}
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

@keyframes pulse{
0%,100%{transform:scale(1)}
50%{transform:scale(1.05)}
}

</style>
</head>

<body>

<div class="container">

<div class="birthday">HAPPY BIRTHDAY MAYA 🎂❤️❤️❤️</div>

<div class="subtitle">Hope you have the most blessed birthday ever and life ahead my love ❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️</div>

<div class="love">I LOVE YOU ❤️</div>

<div class="cake">🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂</div>

</div>

<!-- dancing penguins -->

<div class="penguins">
<div class="penguin">🐧🎉</div>
<div class="penguin">🐧🎈</div>
<div class="penguin">🐧🎊</div>
</div>

<!-- penguin walking with giant cake -->

<div class="walkingPenguin">🐧</div>
<div class="giantCake">🎂</div>

<script>

const heartCount=50
const confettiCount=80

const confettiColors=['#ffffff','#ff69b4','#ffd1dc','#ffe066','#ffc0cb']

for(let i=0;i<heartCount;i++){
const heart=document.createElement('div')
heart.className='heart'
heart.style.left=Math.random()*100+'vw'
heart.style.animationDuration=4+Math.random()*5+'s'
heart.style.animationDelay=Math.random()*5+'s'
heart.style.opacity=0.5+Math.random()*0.5

document.body.appendChild(heart)
}

for(let i=0;i<confettiCount;i++){
const piece=document.createElement('div')
piece.className='confetti'

piece.style.left=Math.random()*100+'vw'
piece.style.top=-Math.random()*100+'vh'
piece.style.background=confettiColors[Math.floor(Math.random()*confettiColors.length)]
piece.style.animationDuration=4+Math.random()*4+'s'
piece.style.animationDelay=Math.random()*4+'s'

document.body.appendChild(piece)
}

</script>

</body>
</html>
