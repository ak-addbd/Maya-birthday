<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Happy Birthday Maya</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg1: #ffb6d9;
      --bg2: #ffcce5;
      --bg3: #ffd9ec;
      --white: #ffffff;
      --dark1: #4a5361;
      --dark2: #27303c;
      --dark3: #151a21;
      --hat: #ff5fa2;
      --gold: #fff7bf;
      --beak1: #ffd16f;
      --beak2: #ff9f2f;
      --gift1: #ff7fb5;
      --gift2: #ff4f9a;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 14px;
    }

    .container {
      position: relative;
      z-index: 8;
      text-align: center;
      width: 100%;
      max-width: 760px;
      color: white;
      text-shadow: 0 4px 14px rgba(0, 0, 0, 0.18);
      padding: 24px 10px 285px;
    }

    .birthday {
      font-size: clamp(2.6rem, 11vw, 5.5rem);
      font-weight: 900;
      line-height: 0.98;
      margin-bottom: 14px;
    }

    .subtitle {
      font-size: clamp(1rem, 4.4vw, 1.7rem);
      line-height: 1.22;
      margin-bottom: 18px;
      padding: 0 4px;
    }

    .love {
      font-size: clamp(1.9rem, 7.5vw, 3.2rem);
      font-weight: bold;
      margin-bottom: 14px;
      animation: pulse 2s infinite;
    }

    .cakeText {
      font-size: clamp(2.1rem, 6.2vw, 4.4rem);
      line-height: 1.08;
      word-break: break-word;
      animation: bounce 2s infinite;
    }

    .heart {
      position: absolute;
      width: 18px;
      height: 18px;
      background: rgba(255, 255, 255, 0.14);
      transform: rotate(45deg);
      animation: floatUp linear infinite;
      pointer-events: none;
      z-index: 1;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      background: rgba(255, 255, 255, 0.14);
      border-radius: 50%;
    }

    .heart::before {
      top: -9px;
      left: 0;
    }

    .heart::after {
      top: 0;
      left: -9px;
    }

    .confetti {
      position: absolute;
      width: 8px;
      height: 14px;
      border-radius: 6px;
      opacity: 0.82;
      animation: fall linear infinite;
      z-index: 2;
      pointer-events: none;
    }

    .sparkle {
      position: absolute;
      color: rgba(255, 255, 255, 0.88);
      font-size: 1rem;
      animation: twinkle 1.8s ease-in-out infinite;
      z-index: 2;
      pointer-events: none;
    }

    .sparkle.one {
      top: 10%;
      left: 8%;
    }

    .sparkle.two {
      top: 16%;
      right: 8%;
      animation-delay: 0.4s;
    }

    .sparkle.three {
      bottom: 24%;
      left: 12%;
      animation-delay: 0.8s;
    }

    .sparkle.four {
      bottom: 30%;
      right: 10%;
      animation-delay: 1.1s;
    }

    .rose {
      position: absolute;
      top: -80px;
      font-size: clamp(1.1rem, 3vw, 1.8rem);
      z-index: 3;
      pointer-events: none;
      animation: roseFall linear infinite;
      filter: drop-shadow(0 6px 8px rgba(0, 0, 0, 0.15));
    }

    .penguins {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 72px;
      z-index: 9;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 28px;
      pointer-events: none;
    }

    .penguinWrap {
      position: relative;
      width: 76px;
      height: 108px;
      transform-origin: center bottom;
    }

    .penguinWrap.dancing {
      animation: dance 1.2s ease-in-out infinite;
    }

    .penguinWrap.one { animation-delay: 0s; }
    .penguinWrap.two { animation-delay: 0.2s; }
    .penguinWrap.three { animation-delay: 0.4s; }

    .penguinWrap.exitLeft { animation: exitLeft 1.6s ease-in forwards; }
    .penguinWrap.exitDown { animation: exitDown 1.6s ease-in forwards; }
    .penguinWrap.exitRight { animation: exitRight 1.6s ease-in forwards; }

    .penguinWrap.returnLeft { animation: returnLeft 1.8s ease-out forwards; }
    .penguinWrap.returnDown { animation: returnDown 1.8s ease-out forwards; }
    .penguinWrap.returnRight { animation: returnRight 1.8s ease-out forwards; }

    .partyHat,
    .walkingHat {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-bottom: 22px solid var(--hat);
      z-index: 8;
    }

    .partyHat::before,
    .walkingHat::before {
      content: "";
      position: absolute;
      top: 20px;
      left: -12px;
      width: 24px;
      height: 5px;
      background: var(--white);
      border-radius: 999px;
    }

    .partyHat::after,
    .walkingHat::after {
      content: "";
      position: absolute;
      top: -6px;
      left: -4px;
      width: 7px;
      height: 7px;
      background: var(--gold);
      border-radius: 50%;
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.15);
    }

    .penguinBody {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 58px;
      height: 78px;
      background: radial-gradient(circle at 35% 25%, var(--dark1) 0%, var(--dark2) 45%, var(--dark3) 100%);
      border-radius: 34px 34px 28px 28px;
      box-shadow: inset -6px -8px 0 rgba(255, 255, 255, 0.05), 0 8px 14px rgba(0, 0, 0, 0.18);
    }

    .penguinBelly {
      position: absolute;
      left: 50%;
      top: 16px;
      transform: translateX(-50%);
      width: 38px;
      height: 50px;
      background: linear-gradient(180deg, #ffffff 0%, #edf1f6 100%);
      border-radius: 22px;
      z-index: 2;
    }

    .penguinHead {
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 50px;
      height: 38px;
      background: linear-gradient(180deg, #404a58 0%, #222a35 100%);
      border-radius: 50% 50% 44% 44%;
      z-index: 4;
    }

    .facePatch {
      position: absolute;
      top: 8px;
      width: 14px;
      height: 14px;
      background: #f7f8fb;
      border-radius: 50%;
      z-index: 5;
      opacity: 0.95;
    }

    .facePatch.left { left: 6px; }
    .facePatch.right { right: 6px; }

    .eye {
      position: absolute;
      top: 13px;
      width: 6px;
      height: 8px;
      background: #111;
      border-radius: 50%;
      z-index: 6;
    }

    .eye::after {
      content: "";
      position: absolute;
      top: 1px;
      left: 1px;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
    }

    .eye.left { left: 15px; }
    .eye.right { right: 15px; }

    .cheek {
      position: absolute;
      top: 22px;
      width: 8px;
      height: 5px;
      background: rgba(255, 176, 196, 0.55);
      border-radius: 50%;
      filter: blur(1px);
      z-index: 5;
    }

    .cheek.left { left: 9px; }
    .cheek.right { right: 9px; }

    .beak {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 11px;
      height: 8px;
      background: linear-gradient(180deg, var(--beak1) 0%, var(--beak2) 100%);
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      z-index: 7;
      border-radius: 2px;
    }

    .smile {
      position: absolute;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      width: 11px;
      height: 5px;
      border-bottom: 2px solid rgba(60, 60, 60, 0.6);
      border-radius: 0 0 12px 12px;
      z-index: 7;
    }

    .wing {
      position: absolute;
      top: 31px;
      width: 15px;
      height: 33px;
      background: linear-gradient(180deg, #1f2630 0%, #0e1319 100%);
      border-radius: 18px;
      z-index: 1;
    }

    .wing.left {
      left: -5px;
      transform: rotate(24deg);
      animation: wingLeft 1s ease-in-out infinite;
      transform-origin: top center;
    }

    .wing.right {
      right: -5px;
      transform: rotate(-24deg);
      animation: wingRight 1s ease-in-out infinite;
      transform-origin: top center;
    }

    .foot {
      position: absolute;
      bottom: -4px;
      width: 14px;
      height: 7px;
      background: #ffb24d;
      border-radius: 999px;
      z-index: 0;
    }

    .foot.left { left: 14px; }
    .foot.right { right: 14px; }

    .gift {
      position: absolute;
      bottom: 10px;
      right: -10px;
      width: 24px;
      height: 24px;
      opacity: 0;
      transform: translateY(12px) scale(0.8);
      transition: opacity 0.5s ease, transform 0.5s ease;
      z-index: 9;
    }

    .giftBox {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--gift1), var(--gift2));
      border-radius: 6px;
      box-shadow: 0 6px 10px rgba(0, 0, 0, 0.12);
    }

    .giftRibbonV,
    .giftRibbonH {
      position: absolute;
      background: var(--gold);
      z-index: 2;
      border-radius: 999px;
    }

    .giftRibbonV {
      width: 5px;
      height: 24px;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
    }

    .giftRibbonH {
      width: 24px;
      height: 5px;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
    }

    .giftBow {
      position: absolute;
      top: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 12px;
      height: 8px;
      z-index: 3;
    }

    .giftBow::before,
    .giftBow::after {
      content: "";
      position: absolute;
      width: 8px;
      height: 8px;
      background: var(--gold);
      border-radius: 10px 10px 0 10px;
    }

    .giftBow::before {
      left: 0;
      transform: rotate(-25deg);
    }

    .giftBow::after {
      right: 0;
      transform: scaleX(-1) rotate(-25deg);
    }

    .penguinWrap.hasGift .gift {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .walkingStage {
  position: absolute;
  left: -220px;
  bottom: 118px;
  z-index: 10;
  display: flex;
  align-items: flex-end;
  gap: 14px;
  pointer-events: none;
  animation: cakeArrive 7s ease-in-out forwards;
}

.walkingStage.stopped {
  left: auto;
  right: 18px;
  bottom: 118px;
  transform: none;
}

    .walkingPenguinWrap {
      position: relative;
      width: 82px;
      height: 110px;
      animation: waddle 0.55s ease-in-out infinite;
    }

    .walkingPenguinWrap .penguinBody {
      width: 64px;
      height: 84px;
    }

    .walkingPenguinWrap .penguinHead {
      width: 54px;
      height: 40px;
    }

    .walkingPenguinWrap .penguinBelly {
      width: 42px;
      height: 54px;
    }

    .giantCake {
      position: relative;
      width: 70px;
      height: 58px;
      animation: cakeBob 1s ease-in-out infinite;
      filter: drop-shadow(0 8px 14px rgba(0, 0, 0, 0.15));
    }

    .cakeBase {
      position: absolute;
      bottom: 7px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 28px;
      background: linear-gradient(180deg, #fff6fb 0%, #f6d9e8 100%);
      border-radius: 10px;
      box-shadow: inset 0 -6px 0 rgba(255, 120, 170, 0.18);
    }

    .cakeTop {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      width: 52px;
      height: 12px;
      background: #fff;
      border-radius: 12px 12px 8px 8px;
    }

    .cakeTrim {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 54px;
      height: 6px;
      background: repeating-linear-gradient(90deg, #ff73a9 0 8px, #fff 8px 16px);
      border-radius: 999px;
    }

    .candle {
      position: absolute;
      bottom: 39px;
      width: 5px;
      height: 12px;
      background: #9ad8ff;
      border-radius: 4px;
    }

    .candle::after {
      content: "";
      position: absolute;
      top: -7px;
      left: 50%;
      transform: translateX(-50%);
      width: 7px;
      height: 7px;
      background: #ffe77a;
      border-radius: 50%;
      clip-path: polygon(50% 0%, 70% 35%, 100% 60%, 70% 100%, 30% 100%, 0% 60%, 30% 35%);
    }

    .candle.one { left: 18px; }
    .candle.two { left: 31px; }
    .candle.three { left: 44px; }

    @keyframes cakeArrive {
      0% { left: -220px; }
      100% { left: calc(100% - 150px); }
    }

    @keyframes exitLeft {
      0% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateX(-170px) translateY(60px) rotate(-18deg); opacity: 0; }
    }

    @keyframes exitDown {
      0% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateX(0) translateY(110px) rotate(0deg); opacity: 0; }
    }

    @keyframes exitRight {
      0% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateX(170px) translateY(60px) rotate(18deg); opacity: 0; }
    }

    @keyframes returnLeft {
      0% { transform: translateX(-190px) translateY(70px) rotate(-18deg); opacity: 0; }
      100% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 1; }
    }

    @keyframes returnDown {
      0% { transform: translateX(0) translateY(120px) rotate(0deg); opacity: 0; }
      100% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 1; }
    }

    @keyframes returnRight {
      0% { transform: translateX(190px) translateY(70px) rotate(18deg); opacity: 0; }
      100% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 1; }
    }

    @keyframes waddle {
      0%, 100% { transform: rotate(-6deg) translateY(0); }
      50% { transform: rotate(6deg) translateY(-6px); }
    }

    @keyframes dance {
      0%, 100% { transform: translateY(0) rotate(-5deg); }
      50% { transform: translateY(-12px) rotate(5deg); }
    }

    @keyframes wingLeft {
      0%, 100% { transform: rotate(24deg); }
      50% { transform: rotate(42deg); }
    }

    @keyframes wingRight {
      0%, 100% { transform: rotate(-24deg); }
      50% { transform: rotate(-42deg); }
    }

    @keyframes floatUp {
      0% { transform: translateY(110vh) rotate(45deg) scale(0.8); opacity: 0; }
      10% { opacity: 1; }
      100% { transform: translateY(-20vh) rotate(45deg) scale(1.2); opacity: 0; }
    }

    @keyframes fall {
      0% { transform: translateY(-20vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0.5; }
    }

    @keyframes roseFall {
      0% { transform: translateY(-100px) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      100% { transform: translateY(115vh) rotate(360deg); opacity: 0.9; }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes cakeBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* Laptop/Desktop fallback */
    @media (min-width: 701px) {
      body {
        padding: 20px;
      }

      .container {
        padding: 30px 20px 220px;
        max-width: 1100px;
      }

      .birthday { font-size: clamp(3.1rem, 9vw, 7rem); }
      .subtitle { font-size: clamp(1.15rem, 2.6vw, 2rem); }
      .love { font-size: clamp(2rem, 5vw, 4rem); }
      .cakeText { font-size: clamp(3.3rem, 7vw, 5.4rem); }

      .penguins {
        bottom: 10px;
        gap: clamp(34px, 8vw, 120px);
      }

      .penguinWrap {
        width: 120px;
        height: 170px;
      }

      .penguinBody {
        width: 92px;
        height: 122px;
      }

      .penguinBelly {
        width: 60px;
        height: 78px;
        top: 26px;
      }

      .penguinHead {
        width: 76px;
        height: 58px;
        top: 8px;
      }

      .facePatch {
        width: 22px;
        height: 22px;
        top: 12px;
      }

      .facePatch.left { left: 9px; }
      .facePatch.right { right: 9px; }

      .eye {
        width: 10px;
        height: 13px;
        top: 20px;
      }

      .eye.left { left: 23px; }
      .eye.right { right: 23px; }

      .cheek {
        width: 12px;
        height: 8px;
        top: 33px;
      }

      .cheek.left { left: 13px; }
      .cheek.right { right: 13px; }

      .beak {
        width: 18px;
        height: 12px;
        top: 30px;
      }

      .smile {
        width: 18px;
        height: 8px;
        top: 42px;
      }

      .wing {
        width: 24px;
        height: 52px;
        top: 50px;
      }

      .wing.left { left: -8px; }
      .wing.right { right: -8px; }

      .foot {
        width: 22px;
        height: 10px;
        bottom: -6px;
      }

      .foot.left { left: 22px; }
      .foot.right { right: 22px; }

      .partyHat,
      .walkingHat {
        border-left: 16px solid transparent;
        border-right: 16px solid transparent;
        border-bottom: 34px solid var(--hat);
        top: 2px;
      }

      .partyHat::before,
      .walkingHat::before {
        top: 31px;

        width: 36px;

      }

      .partyHat::after,

        width: 10px;

      }

      .gift {

        right: -16px;
      }

      .giftRibbonV {
        width: 8px;
        height: 38px;
      }

      .giftRibbonH {
        width: 38px;
        height: 8px;
      }

      .giftBow {
        width: 20px;
        height: 12px;
        top: -6px;
      }

      .giftBow::before,
      .giftBow::after {
        width: 12px;
        height: 12px;
      }

      .walkingStage {
        left: -320px;
        bottom: 24px;
        gap: 30px;
      }

      .walkingStage.stopped {
        right: 140px;
      }

      .walkingPenguinWrap {
        width: 130px;
        height: 170px;
      }

      .walkingPenguinWrap .penguinBody {
        width: 100px;
        height: 130px;
      }

      .walkingPenguinWrap .penguinHead {
        width: 82px;
        height: 62px;
      }

      .walkingPenguinWrap .penguinBelly {
        width: 64px;
        height: 82px;
      }

      .giantCake {
        width: 110px;
        height: 92px;
      }

      .cakeBase {
        width: 94px;
        height: 46px;
        bottom: 10px;
      }

      .cakeTop {
        width: 82px;
        height: 18px;
        bottom: 45px;
      }

      .cakeTrim {
        width: 82px;
        height: 8px;
        bottom: 28px;
      }

      .candle {
        width: 8px;
        height: 18px;
        bottom: 62px;
      }

      .candle.one { left: 28px; }
      .candle.two { left: 50px; }
      .candle.three { left: 72px; }

      @keyframes cakeArrive {
        0% { left: -320px; }
        100% { left: calc(100% - 340px); }
      }
    }
  </style>
</head>
<body>
  <div class="sparkle one">✦</div>
  <div class="sparkle two">✦</div>
  <div class="sparkle three">✦</div>
  <div class="sparkle four">✦</div>

  <div class="container">
    <div class="birthday">HAPPY BIRTHDAY MAYA 🎂❤️❤️❤️</div>
    <div class="subtitle">Hope you have the most blessed birthday ever and life ahead my love ❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️</div>
    <div class="love">I LOVE YOU ❤️</div>
    <div class="cakeText">🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂</div>
  </div>

  <div class="penguins">
    <div class="penguinWrap one dancing" id="penguin1">
      <div class="partyHat"></div>
      <div class="penguinBody">
        <div class="penguinHead">
          <div class="facePatch left"></div>
          <div class="facePatch right"></div>
          <div class="eye left"></div>
          <div class="eye right"></div>
          <div class="cheek left"></div>
          <div class="cheek right"></div>
          <div class="beak"></div>
          <div class="smile"></div>
        </div>

  <script>
    const heartCount = 40;
    const confettiCount = 60;
    const roseCount = 18;
    const confettiColors = ['#ffffff', '#ff69b4', '#ffd1dc', '#ffe066', '#ffc0cb'];

    const penguin1 = document.getElementById('penguin1');
    const penguin2 = document.getElementById('penguin2');
    const penguin3 = document.getElementById('penguin3');
    const walkingStage = document.getElementById('walkingStage');

    for (let i = 0; i < heartCount; i++) {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = 4 + Math.random() * 5 + 's';
      heart.style.animationDelay = Math.random() * 5 + 's';
      heart.style.opacity = 0.2 + Math.random() * 0.35;
      document.body.appendChild(heart);
    }

    for (let i = 0; i < confettiCount; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti';
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.top = -Math.random() * 100 + 'vh';
      piece.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
      piece.style.animationDuration = 4 + Math.random() * 4 + 's';
      piece.style.animationDelay = Math.random() * 4 + 's';
      document.body.appendChild(piece);
    }

    for (let i = 0; i < roseCount; i++) {
      const rose = document.createElement('div');
      rose.className = 'rose';
      rose.textContent = Math.random() > 0.5 ? '🌹' : '🌷';
      rose.style.left = Math.random() * 100 + 'vw';
      rose.style.animationDuration = 7 + Math.random() * 6 + 's';
      rose.style.animationDelay = Math.random() * 8 + 's';
      rose.style.fontSize = (1 + Math.random() * 1.1) + 'rem';
      document.body.appendChild(rose);
    }

    setTimeout(() => {
      walkingStage.classList.add('stopped');
    }, 8000);

    setTimeout(() => {
      penguin1.className = 'penguinWrap one exitLeft';
      penguin2.className = 'penguinWrap two exitDown';
      penguin3.className = 'penguinWrap three exitRight';
    }, 7600);

    setTimeout(() => {
      penguin1.className = 'penguinWrap one returnLeft dancing hasGift';
      penguin2.className = 'penguinWrap two returnDown dancing hasGift';
      penguin3.className = 'penguinWrap three returnRight dancing hasGift';
    }, 9800);
  </script>
