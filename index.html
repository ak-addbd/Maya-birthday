<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Happy Birthday Maya</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  min-height:100vh;
  overflow:hidden;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(135deg,#ffb6d9,#ffcce5,#ffd9ec);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  padding:20px;
}

.container{
  position:relative;
  z-index:5;
  text-align:center;
  padding:30px 20px 150px;
  color:white;
  text-shadow:0 4px 14px rgba(0,0,0,0.18);
  max-width:1100px;
}

.love{
  font-size:clamp(2rem,5vw,4rem);
  margin-top:22px;
  margin-bottom:16px;
  font-weight:bold;
  animation:pulse 2s infinite;
}

.birthday{
  font-size:clamp(3.1rem,9vw,7rem);
  font-weight:900;
  line-height:1.03;
  margin-bottom:18px;
}

.subtitle{
  font-size:clamp(1.15rem,2.6vw,2rem);
  margin-bottom:24px;
  line-height:1.3;
}

.cake{
  font-size:clamp(3.3rem,7vw,5.4rem);
  line-height:1.1;
  animation:bounce 2s infinite;
  word-break:break-word;
}

.heart{
  position:absolute;
  width:24px;
  height:24px;
  background:rgba(255,255,255,0.28);
  transform:rotate(45deg);
  animation:floatUp linear infinite;
  z-index:1;
}

.heart::before,
.heart::after{
  content:"";
  position:absolute;
  width:24px;
  height:24px;
  background:rgba(255,255,255,0.28);
  border-radius:50%;
}

.heart::before{top:-12px;left:0}
.heart::after{top:0;left:-12px}

.confetti{
  position:absolute;
  width:10px;
  height:18px;
  border-radius:6px;
  opacity:0.85;
  animation:fall linear infinite;
  z-index:2;
}

.penguins{
  position:absolute;
  left:0;
  right:0;
  bottom:16px;
  z-index:8;
  display:flex;
  justify-content:center;
  align-items:flex-end;
  gap:clamp(12px,3vw,34px);
  pointer-events:none;
}

.penguinWrap{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  animation:dance 1.2s ease-in-out infinite;
}

.penguinWrap.two{animation-delay:.2s}
.penguinWrap.three{animation-delay:.4s}

.penguin{
  font-size:clamp(4.2rem,8vw,6.2rem);
  line-height:1;
  filter:drop-shadow(0 8px 14px rgba(0,0,0,0.18));
}

.partyHat{
  position:absolute;
  top:-16px;
  font-size:clamp(1.8rem,3vw,2.4rem);
  line-height:1;
}

.walkingStage{
  position:absolute;
  left:-260px;
  bottom:22px;
  z-index:9;
  display:flex;
  align-items:flex-end;
  gap:10px;
  animation:walkAcross 13s linear infinite;
  pointer-events:none;
}

.walkingPenguinWrap{
  position:relative;
  animation:waddle .55s ease-in-out infinite;
}

.walkingPenguin{
  font-size:clamp(4.8rem,9vw,7rem);
  line-height:1;
  filter:drop-shadow(0 8px 14px rgba(0,0,0,0.18));
}

.walkingHat{
  position:absolute;
  top:-18px;
  left:22px;
  font-size:clamp(2rem,3vw,2.7rem);
}

.giantCake{
  font-size:clamp(5rem,10vw,7.8rem);
  line-height:1;
  animation:cakeBob 1s ease-in-out infinite;
  filter:drop-shadow(0 8px 14px rgba(0,0,0,0.15));
}

.sparkle{
  position:absolute;
  color:rgba(255,255,255,0.9);
  font-size:1.2rem;
  animation:twinkle 1.8s ease-in-out infinite;
}

.sparkle.one{top:10%;left:12%}
.sparkle.two{top:18%;right:14%;animation-delay:.4s}
.sparkle.three{bottom:22%;left:18%;animation-delay:.8s}
.sparkle.four{bottom:28%;right:16%;animation-delay:1.1s}

@keyframes walkAcross{
  0%{transform:translateX(0)}
  100%{transform:translateX(calc(100vw + 420px))}
}

@keyframes waddle{
  0%,100%{transform:rotate(-6deg) translateY(0)}
  50%{transform:rotate(6deg) translateY(-6px)}
}

@keyframes dance{
  0%,100%{transform:translateY(0) rotate(-5deg)}
  50%{transform:translateY(-12px) rotate(5deg)}
}

@keyframes floatUp{
  0%{transform:translateY(110vh) rotate(45deg) scale(.8);opacity:0}
  10%{opacity:1}
  100%{transform:translateY(-20vh) rotate(45deg) scale(1.2);opacity:0}
}

@keyframes fall{
  0%{transform:translateY(-20vh) rotate(0deg);opacity:1}
  100%{transform:translateY(110vh) rotate(360deg);opacity:.5}
}

@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.05)}
}

@keyframes cakeBob{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}

@keyframes twinkle{
  0%,100%{opacity:.3;transform:scale(.9)}
  50%{opacity:1;transform:scale(1.2)}
}

@media (max-width: 700px){
  .container{padding:20px 10px 180px}
  .penguins{gap:8px;bottom:8px}
  .walkingStage{bottom:88px}
  .subtitle{padding:0 8px}
  .cake{font-size:clamp(2.8rem,8vw,4rem)}
}

@media (max-height: 700px){
  .container{padding-bottom:130px}
  .penguins{bottom:4px}
}
</style>
</head>
<body>

<div class="sparkle one">✦</div>
<div class="sparkle two">✦</div>
<div class="sparkle three">✦</div>
<div class="sparkle four">✦</div>

<div class="container">
  <div class="birthday">HAPPY BIRTHDAY MAYA 🎂❤️❤️❤️</div>
  <div class="subtitle">Hope you have the most blessed birthday ever and life ahead my love ❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️</div>
  <div class="love">I LOVE YOU ❤️</div>
  <div class="cake">🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂🎂</div>
</div>

<div class="penguins">
  <div class="penguinWrap one">
    <div class="partyHat">🥳</div>
    <div class="penguin">🐧</div>
  </div>
  <div class="penguinWrap two">
    <div class="partyHat">🎉</div>
    <div class="penguin">🐧</div>
  </div>
  <div class="penguinWrap three">
    <div class="partyHat">🎈</div>
    <div class="penguin">🐧</div>
  </div>
</div>

<div class="walkingStage">
  <div class="walkingPenguinWrap">
    <div class="walkingHat">🎊</div>
    <div class="walkingPenguin">🐧</div>
  </div>
  <div class="giantCake">🎂</div>
</div>

<script>
const heartCount = 50;
const confettiCount = 80;
const confettiColors = ['#ffffff','#ff69b4','#ffd1dc','#ffe066','#ffc0cb'];

for(let i=0;i<heartCount;i++){
  const heart=document.createElement('div');
  heart.className='heart';
  heart.style.left=Math.random()*100+'vw';
  heart.style.animationDuration=4+Math.random()*5+'s';
  heart.style.animationDelay=Math.random()*5+'s';
  heart.style.opacity=0.2+Math.random()*0.35;
  document.body.appendChild(heart);
}

for(let i=0;i<confettiCount;i++){
  const piece=document.createElement('div');
  piece.className='confetti';
  piece.style.left=Math.random()*100+'vw';
  piece.style.top=-Math.random()*100+'vh';
  piece.style.background=confettiColors[Math.floor(Math.random()*confettiColors.length)];
  piece.style.animationDuration=4+Math.random()*4+'s';
  piece.style.animationDelay=Math.random()*4+'s';
  document.body.appendChild(piece);
}
</script>

</body>
</html>
